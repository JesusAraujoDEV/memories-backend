paths:
  /api/upload:
    post:
      tags:
        - Upload
      summary: Subir archivo multimedia
      description: Sube una foto o nota de voz a Cloudinary usando stream desde memoria RAM.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Archivo subido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Archivo faltante o solicitud invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Error al subir archivo en Cloudinary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    UploadResponse:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          example: https://res.cloudinary.com/demo/image/upload/v1234567890/sample.jpg
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: File is required in form-data field 'file'
