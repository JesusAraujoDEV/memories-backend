paths:
  /api/auth/register:
    post:
      tags:
        - Usuarios
      summary: Registrar un nuevo usuario
      description: Crea un usuario con nombre unico y password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - password
              properties:
                nombre:
                  type: string
                  minLength: 3
                  example: jesus_araujo
                password:
                  type: string
                  minLength: 8
                  example: mySecurePassword123
      responses:
        '201':
          description: Usuario creado correctamente con token de acceso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Datos invalidos o incompletos
        '409':
          description: El nombre de usuario ya existe

  /api/auth/login:
    post:
      tags:
        - Usuarios
      summary: Iniciar sesion
      description: Autentica un usuario con nombre y password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - password
              properties:
                nombre:
                  type: string
                  example: jesus_araujo
                password:
                  type: string
                  example: mySecurePassword123
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Datos invalidos o incompletos
        '401':
          description: Credenciales invalidas

components:
  schemas:
    Usuario:
      type: object
      required:
        - id
        - nombre
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int32
          example: 1
        nombre:
          type: string
          example: jesus_araujo
        createdAt:
          type: string
          format: date-time
          example: 2026-03-18T15:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-18T15:00:00.000Z

    AuthResponse:
      type: object
      required:
        - accessToken
        - usuario
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        usuario:
          $ref: '#/components/schemas/Usuario'
