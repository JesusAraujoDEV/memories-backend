components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: No autorizado o no eres el dueno de la memoria

    MemoriaAuthor:
      type: object
      required:
        - id
        - nombre
      properties:
        id:
          type: integer
          format: int32
          example: 2
        nombre:
          type: string
          example: pareja_cronocapsula

    CreateMemoriaInput:
      type: object
      required:
        - descripcion
      properties:
        fecha:
          type: string
          format: date-time
          nullable: true
          example: 2026-03-18T00:00:00.000Z
        hora:
          type: string
          nullable: true
          example: "08:30"
        titulo:
          type: string
          nullable: true
          example: Caminata al amanecer
        descripcion:
          type: string
          nullable: false
          example: Fue una manana fria con cielo despejado.
        fotoUrl:
          type: string
          nullable: true
          example: https://cdn.example.com/fotos/memoria-1.jpg
        ubicacion:
          type: string
          nullable: true
          example: Caracas, Venezuela
        moodColor:
          type: string
          nullable: true
          example: '#FFD166'
        cancionUrl:
          oneOf:
            - type: string
              format: uri
              maxLength: 2048
            - type: string
              enum:
                - ""
          nullable: true
          description: URL de cancion opcional. Acepta null, cadena vacia o una URL valida.
          example: https://open.spotify.com/track/xyz

    Memoria:
      type: object
      required:
        - id
        - fecha
        - titulo
        - createdAt
        - updatedAt
        - usuario
      properties:
        id:
          type: integer
          format: int32
          example: 1
        fecha:
          type: string
          format: date-time
          example: 2026-03-18T00:00:00.000Z
        hora:
          type: string
          nullable: true
          example: "08:30"
        titulo:
          type: string
          example: Caminata al amanecer
        descripcion:
          type: string
          nullable: true
          example: Fue una manana fria con cielo despejado.
        fotoUrl:
          type: string
          nullable: true
          example: https://cdn.example.com/fotos/memoria-1.jpg
        ubicacion:
          type: string
          nullable: true
          example: Caracas, Venezuela
        moodColor:
          type: string
          nullable: true
          example: '#FFD166'
        cancionUrl:
          type: string
          nullable: true
          example: https://open.spotify.com/track/xyz
        createdAt:
          type: string
          format: date-time
          example: 2026-03-18T00:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-18T00:00:00.000Z
        usuario:
          $ref: '#/components/schemas/MemoriaAuthor'
