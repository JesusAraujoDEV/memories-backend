paths:
  /api/memorias:
    post:
      tags:
        - Memorias
      summary: Crear una memoria
      description: Crea una nueva memoria para un usuario.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMemoriaInput'
      responses:
        '201':
          description: Memoria creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memoria'
        '400':
          description: Datos invalidos o incompletos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Memorias
      summary: Obtener memorias (timeline o calendario)
      description: Retorna el timeline completo si no se envian filtros. Si se envian year y month, filtra por ese mes y opcionalmente por day.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: year
          required: false
          schema:
            type: integer
            minimum: 1970
            example: 2026
          description: Anio del calendario a consultar. Opcional, pero debe enviarse junto con month.
        - in: query
          name: month
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 3
          description: Mes del calendario a consultar. Opcional, pero debe enviarse junto con year.
        - in: query
          name: day
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 31
            example: 19
          description: Dia del mes a consultar. Requiere year y month. Si se omite, retorna el mes completo.
      responses:
        '200':
          description: Listado de memorias ordenadas de mas reciente a mas antigua
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Memoria'
        '400':
          description: Parametros de consulta invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/memorias/{id}:
    get:
      tags:
        - Memorias
      summary: Obtener una memoria por id
      description: Retorna una memoria especifica del usuario autenticado.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int32
            example: 1
          description: Identificador unico de la memoria.
      responses:
        '200':
          description: Memoria encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memoria'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Memoria no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags:
        - Memorias
      summary: Actualizar parcialmente una memoria
      description: Actualiza campos puntuales de una memoria existente. Solo el usuario que la creo puede editarla.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int32
            example: 1
          description: Identificador unico de la memoria.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemoriaPatchInput'
      responses:
        '200':
          description: Memoria actualizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memoria'
        '400':
          description: Datos invalidos o incompletos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado o no eres el dueno de la memoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Memoria no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Memorias
      summary: Borrar una memoria
      description: Borra una memoria existente. Solo el usuario que la creo puede borrarla.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int32
            example: 1
          description: Identificador unico de la memoria.
      responses:
        '204':
          description: Memoria eliminada correctamente
        '401':
          description: No autorizado o no eres el dueno de la memoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Memoria no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
